<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Cumpleaños - Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-icon">🎂</span>
          <h1 class="brand-name">Bot Cumpleaños</h1>
        </div>
        <button class="btn btn-primary" id="openAddModal">
          <span>+</span> Agregar cumpleaños
        </button>
      </div>
    </header>

    <main class="main">
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <span class="stat-value" id="statTotal">-</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card accent-green">
          <span class="stat-value" id="statSent">-</span>
          <span class="stat-label">Enviados este año</span>
        </div>
        <div class="stat-card accent-amber">
          <span class="stat-value" id="statPending">-</span>
          <span class="stat-label">Pendientes</span>
        </div>
        <div class="stat-card accent-blue">
          <span class="stat-value" id="statGroups">-</span>
          <span class="stat-label">Grupos</span>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre o grupo..." />
        </div>
        <select id="groupFilter" class="select-filter">
          <option value="">Todos los grupos</option>
        </select>
        <select id="statusFilter" class="select-filter">
          <option value="">Todos los estados</option>
          <option value="sent">Enviados</option>
          <option value="pending">Pendientes</option>
        </select>
      </div>

      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">🎂</div>
        <p class="empty-title">No hay cumpleaños todavía</p>
        <p class="empty-sub">Agregá el primer cumpleaños con el botón de arriba</p>
      </div>

      <div id="birthdayGrid" class="birthday-grid"></div>
    </main>
  </div>

  <!-- Modal Agregar / Editar -->
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Agregar cumpleaños</h2>
        <button class="modal-close" id="closeModal" aria-label="Cerrar">&times;</button>
      </div>
      <form id="birthdayForm" class="modal-body" novalidate>
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label for="fieldName" class="form-label">Nombre completo <span class="required">*</span></label>
          <input type="text" id="fieldName" class="form-input" placeholder="Juan Pérez" required />
          <span class="form-error" id="errorName"></span>
        </div>
        <div class="form-group">
          <label for="fieldDate" class="form-label">Fecha (DD-MM) <span class="required">*</span></label>
          <input type="text" id="fieldDate" class="form-input" placeholder="17-08" maxlength="5" required />
          <span class="form-error" id="errorDate"></span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="fieldGroupName" class="form-label">Nombre del grupo</label>
            <input type="text" id="fieldGroupName" class="form-input" placeholder="Mi familia" />
          </div>
          <div class="form-group">
            <label for="fieldGroupId" class="form-label">ID del grupo</label>
            <input type="text" id="fieldGroupId" class="form-input" placeholder="1234...@g.us" />
          </div>
        </div>
        <div class="form-group">
          <label for="fieldMessage" class="form-label">Mensaje personalizado</label>
          <textarea id="fieldMessage" class="form-input form-textarea" placeholder="Feliz cumpleaños! (opcional)"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancelModal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
